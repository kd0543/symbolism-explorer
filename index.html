<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Black Leather Cult</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
    overflow: hidden;
  }

  body {
    display: grid;
    place-items: center;
    position: relative;
    background:
      radial-gradient(circle at 50% 40%, rgba(8, 0, 0, 0.6), rgba(0, 0, 0, 1)),
      url("IMAGES/brush-strokes-4k.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  

  /* Ouroboros — dimmer crimson glow */
  .ouro {
    width: 50vmin;
    max-width: 560px;
    cursor: pointer;
    animation: spin 36s linear infinite;
    filter:
      drop-shadow(0 0 10px rgba(120, 0, 0, 0.7))
      drop-shadow(0 0 30px rgba(90, 0, 0, 0.5))
      drop-shadow(0 0 60px rgba(50, 0, 0, 0.3));
    transition: filter 0.3s ease-in-out;
    position: relative;
    z-index: 1;
  }
  .ouro:hover {
    filter:
      drop-shadow(0 0 16px rgba(180, 0, 0, 0.9))
      drop-shadow(0 0 40px rgba(110, 0, 0, 0.6));
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(-360deg); }
  }
</style>
</head>
<body>
  <img class="ouro" src="IMAGES/oroborus.png" alt="Ouroboros"
       onclick="location.assign('blackleathercult.html')">
</body>
</html>
